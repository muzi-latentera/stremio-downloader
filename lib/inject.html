<div id="download-toast" style="cursor: pointer"><div id="download-toast-img"><img src="https://lh3.googleusercontent.com/I5uvzsai-Vzbcf9AQA0OhlziOnorx3n_DLnAik7oU_NopxME22IUv4f8xljYd8-lTg=w300" width="40" height="40"></div><div id="download-toast-desc"></div></div>
<script>

	function launch_toast(msg) {
		var toast = document.getElementById('download-toast')
		var desc = document.getElementById('download-toast-desc')
		desc.textContent = msg
		toast.style.visibility = 'visible'
		toast.style.opacity = '1'
		toast.style.bottom = '30px'
		toast.style.minWidth = (desc.scrollWidth + 50) + 'px'
		setTimeout(function() {
			toast.style.minWidth = '50px'
			setTimeout(function() {
				toast.style.bottom = '0px'
				toast.style.opacity = '0'
				toast.style.visibility = 'hidden'
			}, 500)
		}, 9000)
	}

	(function () {

		document.getElementById('download-toast').addEventListener('click', function() {
			var url = window.location.href
			url = url.split('/web/')[0] + '/api?method=focus-window'
			fetch(url)
		})

		var css = '#download-toast{max-width:50px;height:50px;margin:auto;background-color:#333;color:#fff;text-align:center;border-radius:2px;position:fixed;z-index:99999;left:0;right:0;bottom:0;font-size:17px;white-space:nowrap;overflow:hidden;opacity:0;transition:all 0.5s ease}#download-toast-img{width:50px;height:50px;float:left;padding-top:5px;padding-bottom:5px;box-sizing:border-box;background-color:#111;color:#fff}#download-toast-desc{font-weight:normal;color:#fff;padding:16px;overflow:hidden;white-space:nowrap}',
			head = document.head || document.getElementsByTagName('head')[0],
			style = document.createElement('style')

		head.appendChild(style)

		style.type = 'text/css'
		if (style.styleSheet) {
		  style.styleSheet.cssText = css
		} else {
		  style.appendChild(document.createTextNode(css))
		}

		var log = console.info;
		console.info = async function () {
			var text = arguments[0]
			if (typeof text === 'string' && text.includes('Player starting URL:')) {
				var videoUrl = text.split('Player starting URL: ')[1].split(' ')[0]
				var titleEl = document.getElementById('windowTitle') || document.querySelector('[class*="title"]') || document.querySelector('title')
				var title = titleEl ? (titleEl.textContent || titleEl.innerText || '').trim() : 'Unknown'
				if (videoUrl.startsWith('http://127.0.0.1:') && videoUrl.endsWith('/hls.m3u8'))
					videoUrl = videoUrl.replace('/hls.m3u8', '/')
				var url = window.location.href
				var streamId = url.split('/')[10] || ''
				var metaUrl = window.lastMetaUrl || ''
				var metaId = ''
				var metaType = ''
				if (metaUrl && metaUrl.includes('/')) {
					var parts = metaUrl.split('/')
					metaId = parts.pop()
					metaId = metaId.replace('.json', '')
					metaType = parts.pop()
				}
				url = url.split('/web/')[0] + '/api?method=add-download&url=' + encodeURIComponent(videoUrl) + '&title=' + encodeURIComponent(title) + '&streamId=' + encodeURIComponent(streamId) + '&metaUrl=' + encodeURIComponent(metaUrl) + '&metaId=' + encodeURIComponent(metaId) + '&metaType=' + encodeURIComponent(metaType)
				window.history.back()
				var response = await fetch(url)
				var downUrl = await response.text()
				launch_toast('Started downloading ' + downUrl)
			}
			log.apply(this, Array.prototype.slice.call(arguments));
		};

		// Fallback: also monitor video element src changes
		var observer = new MutationObserver(function(mutations) {
			mutations.forEach(function(mutation) {
				if (mutation.type === 'attributes' && mutation.attributeName === 'src') {
					var src = mutation.target.src
					if (src && (src.includes('.mp4') || src.includes('.mkv') || src.includes('.m3u8'))) {
						console.log('[Stremio Downloader] Detected video src change: ' + src)
					}
				}
			})
		})

		// Watch for video elements being added
		var bodyObserver = new MutationObserver(function(mutations) {
			mutations.forEach(function(mutation) {
				mutation.addedNodes.forEach(function(node) {
					if (node.tagName === 'VIDEO') {
						observer.observe(node, { attributes: true, attributeFilter: ['src'] })
					}
					if (node.querySelectorAll) {
						node.querySelectorAll('video').forEach(function(video) {
							observer.observe(video, { attributes: true, attributeFilter: ['src'] })
						})
					}
				})
			})
		})
		bodyObserver.observe(document.body || document.documentElement, { childList: true, subtree: true })
	}());
</script>
