<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Stremio Downloader</title>
		<link rel="stylesheet" type="text/css" href="styles.css">
		<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" type="text/css">
	</head>

	<body>
		<div id="pageContent">
			<div id="header">
				<img src="logo.png" alt="Stremio Downloader">
				<div id="stremio-status" class="status-indicator disconnected">Stremio server: checking...</div>
			</div>

			<div class="searchContent">
				<div class="search-left">
					<input type="text" id="query" placeholder="Search downloads..." autocomplete="off">
				</div>
				<div class="search-right">
					<button class="btn" onclick="options()">Options</button>
					<button class="btn btn-primary" onclick="apiCall('load-stremio')">Load Stremio</button>
				</div>
			</div>

			<div class="content">
				<div id="no-downloads" class="notes">You haven't downloaded anything yet. Press "Load Stremio" to select something to download.</div>
				<div id="no-engine" class="notes warning" style="display:none">Stremio streaming server not detected. Torrent downloads require Stremio to be running.</div>
				<table id="downloads">
				</table>
			</div>

			<div class="spacer"></div>
		</div>
		<dialog id="dialog"></dialog>
		<script src="script.js"></script>
	</body>

</html>
